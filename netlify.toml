# Netlify configuration for TalesGalore

[build]
  publish = "."

# Redirect all 404s to index for clean navigation
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

<section id="lc">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">

<style>
#lc{
  background:#fdf8f0;
  padding:40px 0;
  font-family:'Crimson Text',Georgia,serif;
  border-top:1px solid rgba(200,134,42,.15);
  border-bottom:1px solid rgba(200,134,42,.15);
}

.lc-header{
  max-width:860px;
  margin:0 auto;
  padding:0 24px 14px;
  display:flex;
  align-items:center;
  gap:14px;
}

.lc-header-rule{
  flex:1;
  height:1px;
  background:linear-gradient(to right,rgba(200,134,42,.3),transparent);
}

.lc-header-rule.left{
  background:linear-gradient(to left,rgba(200,134,42,.3),transparent);
}

.lc-header-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:17px;
  font-weight:700;
  color:#1c1410;
}

.lc-datebar{
  max-width:860px;
  margin:0 auto;
  padding:0 24px 16px;
  display:flex;
  align-items:center;
  gap:10px;
}

.lc-datebar label{
  font-family:'IM Fell English SC',serif;
  font-size:10px;
  letter-spacing:.2em;
  color:#9a8a7a;
}

.lc-datepicker{
  border:1px solid rgba(200,134,42,.35);
  background:#fff;
  color:#2e2218;
  padding:5px 10px;
}

.lc-today-btn{
  padding:5px 14px;
  border:1px solid rgba(200,134,42,.35);
  background:none;
  color:#c8862a;
  cursor:pointer;
}

.lc-inner{
  max-width:860px;
  margin:0 auto;
  padding:0 24px;
  display:grid;
  grid-template-columns:160px 1fr;
}

.lc-image-col{
  overflow:hidden;
  background:#2a2018;
  min-height:180px;
}

.lc-image-col img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.lc-image-fallback{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  font-size:64px;
  color:rgba(200,134,42,.4);
}

.lc-body{
  padding:24px 28px;
}

.lc-meta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.lc-badge{
  font-size:11px;
  padding:4px 10px;
  border:1px solid;
}

.lc-badge.quote{
  color:#c8862a;
  border-color:rgba(200,134,42,.35);
}

.lc-badge.anecdote{
  color:#5a7a5a;
  border-color:rgba(90,122,90,.35);
}

.lc-badge.fact{
  color:#4a6a8a;
  border-color:rgba(74,106,138,.35);
}

.lc-text{
  font-size:18px;
  line-height:1.7;
  color:#2e2218;
}

.lc-text.is-quote{
  font-family:'Playfair Display',serif;
  font-style:italic;
}

.lc-author-row{
  margin-top:20px;
  border-top:1px solid rgba(200,134,42,.12);
  padding-top:12px;
}

.lc-author-name{
  font-weight:bold;
}

.lc-loading{
  text-align:center;
  padding:30px;
}

@media(max-width:600px){
  .lc-inner{
    grid-template-columns:1fr;
  }
}
</style>

<div class="lc-header">
  <div class="lc-header-rule left"></div>
  <div class="lc-header-title">The Literary Corner</div>
  <div class="lc-header-rule"></div>
</div>

<div class="lc-datebar">
  <label for="lc-pick">Browse by date</label>
  <input type="date" id="lc-pick" class="lc-datepicker">
  <button class="lc-today-btn" id="lc-today">Today</button>
</div>

<div class="lc-inner" id="lc-content">
  <div class="lc-loading">Opening the pages...</div>
</div>

<script src="literary-data.js"></script>

<script>
(function(){

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function render(dateObj){

  const D = window.LITERARY_DATA;

  if(!D || !D.pool || !D.days){
    document.getElementById('lc-content').innerHTML =
      '<div class="lc-loading">literary-data.js not loaded.</div>';
    return;
  }

  const mm = String(dateObj.getMonth()+1).padStart(2,'0');
  const dd = String(dateObj.getDate()).padStart(2,'0');

  const day = D.days[mm + '-' + dd];

  if(!day){
    document.getElementById('lc-content').innerHTML =
      '<div class="lc-loading">No entry found for this date.</div>';
    return;
  }

  const e = D.pool[day.e];

  document.getElementById('lc-content').innerHTML = `
    <div class="lc-image-col">
      <div class="lc-image-fallback">${esc((e.author||'?')[0])}</div>
    </div>

    <div class="lc-body">
      <div class="lc-meta">
        <span class="lc-badge ${e.type}">${esc(e.type)}</span>
      </div>

      <div class="lc-text ${e.type==='quote'?'is-quote':''}">
        ${esc(e.content)}
      </div>

      <div class="lc-author-row">
        <div class="lc-author-name">${esc(e.author)}</div>
        <div>${esc(e.nationality||'')}</div>
      </div>
    </div>
  `;
}

const picker = document.getElementById('lc-pick');
const today = new Date();

picker.value =
  today.getFullYear() + '-' +
  String(today.getMonth()+1).padStart(2,'0') + '-' +
  String(today.getDate()).padStart(2,'0');

render(today);

picker.addEventListener('change', function(){
  render(new Date(this.value));
});

document.getElementById('lc-today').addEventListener('click', function(){
  const t = new Date();

  picker.value =
    t.getFullYear() + '-' +
    String(t.getMonth()+1).padStart(2,'0') + '-' +
    String(t.getDate()).padStart(2,'0');

  render(t);
});

})();
</script>

</section>
